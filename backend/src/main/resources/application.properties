spring.application.name=quickserve

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── Database (PostgreSQL) ─────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quickserve}
spring.datasource.username=${DB_USERNAME:quickserve}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=QuickServe2024SuperSecretKeyForJWTTokenGeneration32BytesMin!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Müşteri ekranında Iyzico olmadan tam ödeme akışını test etmek için (POST /customer/payments/simulate-complete)
app.customer-payment-simulation-enabled=true

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:8081

# ─── Frontend URL (QR links) ──────────────────────────────────────────────────
app.frontend-url=http://localhost:3000

# ─── Mail (SMTP) ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@quickserve.com

# ─── Netgsm SMS ───────────────────────────────────────────────────────────────
app.sms.netgsm.api-url=https://api.netgsm.com.tr/sms/send/get
app.sms.netgsm.usercode=${NETGSM_USERCODE:your-netgsm-usercode}
app.sms.netgsm.password=${NETGSM_PASSWORD:your-netgsm-password}
app.sms.netgsm.msgheader=${NETGSM_HEADER:QUICKSERVE}

# ─── Superadmin ───────────────────────────────────────────────────────────────
app.superadmin.username=${SUPERADMIN_USERNAME:s}
app.superadmin.password=${SUPERADMIN_PASSWORD:1}
app.superadmin.email=${SUPERADMIN_EMAIL:hasandemir.cse@gmail.com}
app.superadmin.phone=${SUPERADMIN_PHONE:+905001234567}

# ─── Cache ────────────────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.quickserve=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/quickserve.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ─── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Rate Limiting ────────────────────────────────────────────────────────────
app.rate-limit.requests-per-minute=60
app.rate-limit.auth-requests-per-minute=10
