spring.application.name=quickserve-edge

server.port=${EDGE_PORT:8081}
server.servlet.context-path=/api

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

app.edge.node-id=${EDGE_NODE_ID:edge-local}
app.edge.restaurant-id=${EDGE_RESTAURANT_ID:0}
app.edge.cloud-base-url=${EDGE_CLOUD_BASE_URL:http://localhost:8080/api}
app.edge.bridge-jwt-token=${EDGE_BRIDGE_JWT_TOKEN:}

spring.datasource.url=jdbc:sqlite:${EDGE_SQLITE_PATH:./data/edge.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-test-query=SELECT 1

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.edge.sync.worker-enabled=${EDGE_SYNC_WORKER_ENABLED:true}
app.edge.sync.interval-ms=${EDGE_SYNC_INTERVAL_MS:5000}
app.edge.sync.batch-size=${EDGE_SYNC_BATCH_SIZE:50}
app.edge.sync.max-retry=${EDGE_SYNC_MAX_RETRY:10}
app.edge.sync.base-backoff-seconds=${EDGE_SYNC_BASE_BACKOFF_SECONDS:5}
app.edge.sync.maintenance.enabled=${EDGE_SYNC_MAINTENANCE_ENABLED:true}
app.edge.sync.maintenance.interval-ms=${EDGE_SYNC_MAINTENANCE_INTERVAL_MS:3600000}
app.edge.sync.retention.sent-days=${EDGE_SYNC_RETENTION_SENT_DAYS:3}
app.edge.sync.retention.dead-days=${EDGE_SYNC_RETENTION_DEAD_DAYS:14}
app.edge.sync.retention.inbox-processed-days=${EDGE_SYNC_RETENTION_INBOX_PROCESSED_DAYS:7}
app.edge.sync.retention.inbox-dead-days=${EDGE_SYNC_RETENTION_INBOX_DEAD_DAYS:14}

app.edge.device.pos.default-provider=${EDGE_POS_DEFAULT_PROVIDER:mock-pos}
app.edge.device.printer.default-provider=${EDGE_PRINTER_DEFAULT_PROVIDER:mock-printer}
app.edge.device.pos.http.enabled=${EDGE_POS_HTTP_ENABLED:false}
app.edge.device.pos.http.provider-code=${EDGE_POS_HTTP_PROVIDER_CODE:http-pos}
app.edge.device.pos.http.base-url=${EDGE_POS_HTTP_BASE_URL:}
app.edge.device.pos.http.charge-path=${EDGE_POS_HTTP_CHARGE_PATH:/charge}
app.edge.device.pos.http.bearer-token=${EDGE_POS_HTTP_BEARER_TOKEN:}
app.edge.device.pos.http.api-key-header=${EDGE_POS_HTTP_API_KEY_HEADER:X-API-Key}
app.edge.device.pos.http.api-key-value=${EDGE_POS_HTTP_API_KEY_VALUE:}
app.edge.device.pos.http.response.success-field=${EDGE_POS_HTTP_RESPONSE_SUCCESS_FIELD:success}
app.edge.device.pos.http.response.success-value=${EDGE_POS_HTTP_RESPONSE_SUCCESS_VALUE:true}
app.edge.device.pos.http.response.tx-id-fields=${EDGE_POS_HTTP_RESPONSE_TX_ID_FIELDS:transactionId,txId,id}
app.edge.device.pos.http.response.message-fields=${EDGE_POS_HTTP_RESPONSE_MESSAGE_FIELDS:message,statusMessage}
app.edge.device.pos.http.response.error-code-fields=${EDGE_POS_HTTP_RESPONSE_ERROR_CODE_FIELDS:errorCode,code}
app.edge.device.pos.http.response.retryable-field=${EDGE_POS_HTTP_RESPONSE_RETRYABLE_FIELD:retryable}
app.edge.device.pos.http.connect-timeout-ms=${EDGE_POS_HTTP_CONNECT_TIMEOUT_MS:3000}
app.edge.device.pos.http.read-timeout-ms=${EDGE_POS_HTTP_READ_TIMEOUT_MS:8000}
app.edge.device.pos.audit.retention-days=${EDGE_POS_AUDIT_RETENTION_DAYS:90}
