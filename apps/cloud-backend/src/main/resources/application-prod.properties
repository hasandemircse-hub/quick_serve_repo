# Production profile (server)
# Docker/.env uzerinden override edilebilir.
app.cors.allowed-origins=${CORS_ORIGINS:https://quickserve.duckdns.org,http://quickserve.duckdns.org}
app.frontend-url=${FRONTEND_URL:https://quickserve.duckdns.org/#}

# Edge JWT bypass asla prod'da açılamaz (ortam değişkeni ile bile).
app.dev.insecure-edge-cloud-bridge=false
