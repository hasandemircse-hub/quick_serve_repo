name: CI/CD Pipeline

# Otomatik tetikleme kapalı (her commit'te çalışmaz). Canlıda CI/CD için
# aşağıdaki push bloğunun yorumunu kaldırın; şimdilik yalnızca manuel çalıştırma.
on:
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hasandemircse-hub/quick_serve/quickserve-backend
  EDGE_IMAGE_NAME: hasandemircse-hub/quick_serve/quickserve-edge-backend

permissions:
  contents: read

jobs:
  # ─── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quickserve_test
          POSTGRES_USER: quickserve
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./apps/cloud-backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn test --no-transfer-progress

  # ─── Build & Push ─────────────────────────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Flutter Web Build
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build cloud-frontend web artifact
        run: |
          DEPLOY_HOST_VALUE="${{ secrets.DEPLOY_HOST }}"
          if [ -z "$DEPLOY_HOST_VALUE" ]; then DEPLOY_HOST_VALUE="localhost"; fi
          CLOUD_API_URL="http://$DEPLOY_HOST_VALUE/api" \
          EDGE_API_URL="http://$DEPLOY_HOST_VALUE/api" \
          WEB_ADMIN_URL="http://$DEPLOY_HOST_VALUE/auth/admin" \
          ./apps/cloud-frontend/build_web.sh

      - name: Upload cloud-frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-frontend-web
          path: apps/cloud-frontend/build/web/

      - name: Build edge-frontend web artifact
        run: |
          DEPLOY_HOST_VALUE="${{ secrets.DEPLOY_HOST }}"
          if [ -z "$DEPLOY_HOST_VALUE" ]; then DEPLOY_HOST_VALUE="localhost"; fi
          EDGE_API_URL="http://$DEPLOY_HOST_VALUE:8081/api" \
          CLOUD_API_URL="http://$DEPLOY_HOST_VALUE/api" \
          ./apps/edge-frontend/build_web.sh

      - name: Upload edge-frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-frontend-web
          path: apps/edge-frontend/build/web/

      # Backend Build
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: ./apps/cloud-backend
        run: mvn package -DskipTests --no-transfer-progress

      - name: Build Edge JAR
        working-directory: ./apps/edge-backend
        run: mvn package -DskipTests --no-transfer-progress

      # Docker Image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/cloud-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Edge Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/edge-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.EDGE_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.EDGE_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    environment:
      name: production
      url: http://165.245.214.173

    steps:
      - uses: actions/checkout@v4

      - name: Validate required deploy secrets
        run: |
          set -euo pipefail
          [[ -n "${{ secrets.DEPLOY_HOST }}" ]] || (echo "DEPLOY_HOST is required" && exit 1)
          [[ -n "${{ secrets.DEPLOY_USER }}" ]] || (echo "DEPLOY_USER is required" && exit 1)
          [[ -n "${{ secrets.DEPLOY_PATH }}" ]] || (echo "DEPLOY_PATH is required" && exit 1)
          [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]] || (echo "DEPLOY_SSH_KEY is required" && exit 1)

      - name: Download cloud-frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: cloud-frontend-web
          path: flutter-web/

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,flutter-web/"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,DEPLOY_PATH
          script: |
            set -euo pipefail

            # Deploy path ve env önkontrol
            mkdir -p "$DEPLOY_PATH"
            if [ ! -f "$DEPLOY_PATH/.env" ]; then
              echo "ERROR: $DEPLOY_PATH/.env bulunamadı"
              exit 1
            fi

            # Zaman damgalı yedek klasörü
            BACKUP_DIR="$DEPLOY_PATH/backups"
            TS="$(date +%Y%m%d-%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            # Compose dosyası varsa önce DB yedeği al (best effort)
            if [ -f "$DEPLOY_PATH/docker-compose.yml" ]; then
              echo "DB backup alınıyor (best effort)..."
              docker compose -f "$DEPLOY_PATH/docker-compose.yml" --env-file "$DEPLOY_PATH/.env" exec -T postgres sh -lc \
                'pg_dump -U "${POSTGRES_USER:-quickserve}" "${POSTGRES_DB:-quickserve}"' \
                > "$BACKUP_DIR/db-$TS.sql" || echo "WARN: DB backup alınamadı, deploy devam ediyor."
            fi

            # Registry'ye giriş yap
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Yeni backend image'ını çek
            docker pull ghcr.io/hasandemircse-hub/quick_serve/quickserve-backend:latest

            # Flutter web dosyalarını volume'a kopyala
            docker run --rm \
              -v $DEPLOY_PATH/flutter-web:/src:ro \
              -v quickserve_flutter_web:/dst \
              alpine sh -c "cp -r /src/. /dst/"

            # Tüm servisleri başlat / güncelle
            docker compose -f "$DEPLOY_PATH/docker-compose.yml" --env-file "$DEPLOY_PATH/.env" up -d

            # Eski image'ları temizle
            docker image prune -f

            # Eski yedekleri temizle (son 10 yedek)
            ls -1t "$BACKUP_DIR"/db-*.sql 2>/dev/null | tail -n +11 | xargs -r rm -f

            # Health check (Spring Boot başlaması için bekle)
            # Not: backend server context-path '/api' olduğu için health endpoint: /api/actuator/health
            echo "Backend başlaması bekleniyor..."
            for i in $(seq 1 12); do
              sleep 10
              echo "Deneme $i/12..."

              # 1) Host üzerinden (nginx üzerinden)
              if curl -sf http://localhost/api/actuator/health >/dev/null 2>&1; then
                echo "Health check PASSED (host -> nginx)!"
                exit 0
              fi

              # 2) Backend container içinden (security/path doğrulaması için daha sağlıklı)
              if docker compose -f "$DEPLOY_PATH/docker-compose.yml" exec -T backend sh -c ' \
                if command -v curl >/dev/null 2>&1; then \
                  curl -sf http://localhost:8080/api/actuator/health >/dev/null 2>&1; \
                elif command -v wget >/dev/null 2>&1; then \
                  wget -q --spider http://localhost:8080/api/actuator/health >/dev/null 2>&1; \
                else \
                  exit 2; \
                fi \
              '; then
                echo "Health check PASSED (backend container)!"
                exit 0
              fi

              if [ $i -eq 12 ]; then
                echo "Health check başarısız!"
                echo "--- nginx logs ---"
                docker compose -f "$DEPLOY_PATH/docker-compose.yml" logs --tail=200 nginx || true
                echo "--- backend logs ---"
                docker compose -f "$DEPLOY_PATH/docker-compose.yml" logs --tail=200 backend || true
                exit 1
              fi
            done

            echo "Deploy tamamlandı: $(date)"
