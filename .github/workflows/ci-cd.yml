name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hasandemircse-hub/quick_serve/quickserve-backend

jobs:
  # ─── Test ─────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quickserve_test
          POSTGRES_USER: quickserve
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./backend
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw test --no-transfer-progress

  # ─── Build & Push ─────────────────────────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Flutter Web Build
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Web
        working-directory: ./frontend_flutter
        run: flutter build web --dart-define=API_URL=http://${{ secrets.DEPLOY_HOST }}/api --release

      - name: Upload Flutter build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: frontend_flutter/build/web/

      # Backend Build
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: ./backend
        run: ./mvnw package -DskipTests --no-transfer-progress

      # Docker Image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ secrets.DEPLOY_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: flutter-web/

      - name: Copy config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,flutter-web/"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,DEPLOY_PATH
          script: |
            cd $DEPLOY_PATH

            # Registry'ye giriş yap
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Yeni backend image'ını çek
            docker pull ghcr.io/hasandemircse-hub/quick_serve/quickserve-backend:latest

            # Flutter web dosyalarını volume'a kopyala
            docker run --rm \
              -v $DEPLOY_PATH/flutter-web:/src:ro \
              -v quickserve_flutter_web:/dst \
              alpine sh -c "cp -r /src/. /dst/"

            # Tüm servisleri başlat / güncelle
            docker compose up -d

            # Eski image'ları temizle
            docker image prune -f

            # Health check
            sleep 20
            curl -sf http://localhost/api/actuator/health || exit 1

            echo "Deploy tamamlandı: $(date)"
