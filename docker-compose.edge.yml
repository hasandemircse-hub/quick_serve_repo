version: '3.9'

services:
  edge-backend:
    build:
      context: ./apps/edge-backend
    image: quickserve-edge-backend:local
    container_name: quickserve_edge_backend
    environment:
      EDGE_PORT: 8081
      EDGE_NODE_ID: ${EDGE_NODE_ID}
      EDGE_RESTAURANT_ID: ${EDGE_RESTAURANT_ID}
      EDGE_CLOUD_BASE_URL: ${EDGE_CLOUD_BASE_URL}
      EDGE_BRIDGE_JWT_TOKEN: ${EDGE_BRIDGE_JWT_TOKEN:-}
      EDGE_SQLITE_PATH: ${EDGE_SQLITE_PATH:-/data/edge.db}
      EDGE_ENROLLMENT_TOKEN: ${EDGE_ENROLLMENT_TOKEN}
      EDGE_SYNC_INTERVAL_MS: ${EDGE_SYNC_INTERVAL_MS:-5000}
      EDGE_POS_DEFAULT_PROVIDER: ${EDGE_POS_DEFAULT_PROVIDER:-mock-pos}
      EDGE_POS_HTTP_ENABLED: ${EDGE_POS_HTTP_ENABLED:-false}
      EDGE_POS_HTTP_PROVIDER_CODE: ${EDGE_POS_HTTP_PROVIDER_CODE:-http-pos}
      EDGE_POS_HTTP_BASE_URL: ${EDGE_POS_HTTP_BASE_URL:-}
      EDGE_POS_HTTP_CHARGE_PATH: ${EDGE_POS_HTTP_CHARGE_PATH:-/charge}
      EDGE_POS_HTTP_BEARER_TOKEN: ${EDGE_POS_HTTP_BEARER_TOKEN:-}
      EDGE_POS_HTTP_API_KEY_HEADER: ${EDGE_POS_HTTP_API_KEY_HEADER:-X-API-Key}
      EDGE_POS_HTTP_API_KEY_VALUE: ${EDGE_POS_HTTP_API_KEY_VALUE:-}
      EDGE_POS_HTTP_CONNECT_TIMEOUT_MS: ${EDGE_POS_HTTP_CONNECT_TIMEOUT_MS:-3000}
      EDGE_POS_HTTP_READ_TIMEOUT_MS: ${EDGE_POS_HTTP_READ_TIMEOUT_MS:-8000}
      EDGE_POS_AUDIT_RETENTION_DAYS: ${EDGE_POS_AUDIT_RETENTION_DAYS:-90}
      EDGE_PRINTER_DEFAULT_PROVIDER: ${EDGE_PRINTER_DEFAULT_PROVIDER:-mock-printer}
    ports:
      - "8081:8081"
    volumes:
      - edge_sqlite_data:/data
    restart: unless-stopped

volumes:
  edge_sqlite_data:
