  <circle cx="512" cy="512" r="512" fill="#E53935"/>

  <!-- Plate -->
  <ellipse cx="512" cy="650" rx="280" ry="80" fill="#FFFFFF"/>
  <ellipse cx="512" cy="640" rx="260" ry="60" fill="#F5F5F5"/>

  <!-- Food on plate (stylized) -->
