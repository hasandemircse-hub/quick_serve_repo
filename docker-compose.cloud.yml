services:
  cloud-postgres:
    image: postgres:16-alpine
    container_name: quickserve_cloud_db
    environment:
      POSTGRES_DB: ${CLOUD_DB_NAME:-quickserve}
      POSTGRES_USER: ${CLOUD_DB_USERNAME:-quickserve}
      POSTGRES_PASSWORD: ${CLOUD_DB_PASSWORD}
    volumes:
      - cloud_postgres_data:/var/lib/postgresql/data
    ports:
      # Ana docker-compose (quickserve_db) 5432 kullanıyorsa çakışmayı önler; hosttan: localhost:5433
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLOUD_DB_USERNAME:-quickserve}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloud-backend:
    build:
      context: ./apps/cloud-backend
    image: quickserve-cloud-backend:local
    container_name: quickserve_cloud_backend
    networks:
      default:
        aliases:
          # nginx.conf içindeki proxy_pass hedefi `backend` (kök compose ile uyum)
          - backend
    depends_on:
      cloud-postgres:
        condition: service_healthy
    environment:
      DB_HOST: cloud-postgres
      DB_PORT: 5432
      DB_NAME: ${CLOUD_DB_NAME:-quickserve}
      DB_USERNAME: ${CLOUD_DB_USERNAME:-quickserve}
      DB_PASSWORD: ${CLOUD_DB_PASSWORD}
      JWT_SECRET: ${CLOUD_JWT_SECRET}
      FRONTEND_URL: ${CLOUD_FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CLOUD_CORS_ORIGINS:-http://localhost}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PHONE: ${SUPERADMIN_PHONE:-}
      # Kapalı lab (LAN): edge JWT göndermeden /edge/bootstrap vb. — .env.cloud ile false; lab için true + backend restart.
      QUICKSERVE_DEV_INSECURE_EDGE_BRIDGE: ${QUICKSERVE_DEV_INSECURE_EDGE_BRIDGE:-false}
    ports:
      - "8080:8080"
    volumes:
      - cloud_backend_logs:/app/logs
    restart: unless-stopped

  cloud-nginx:
    image: nginx:alpine
    container_name: quickserve_cloud_nginx
    depends_on:
      - cloud-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - flutter_web:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  cloud_postgres_data:
  cloud_backend_logs:
  flutter_web:
    external: true
    name: quickserve_flutter_web
