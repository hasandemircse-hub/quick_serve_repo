version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quickserve_db
    environment:
      POSTGRES_DB: quickserve
      POSTGRES_USER: ${DB_USERNAME:-quickserve}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickserve"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: quickserve-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickserve_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: quickserve
      DB_USERNAME: ${DB_USERNAME:-quickserve}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NETGSM_USERCODE: ${NETGSM_USERCODE:-}
      NETGSM_PASSWORD: ${NETGSM_PASSWORD:-}
      NETGSM_HEADER: ${NETGSM_HEADER:-QUICKSERVE}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PHONE: ${SUPERADMIN_PHONE:-}
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quickserve_nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - flutter_web:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:
  flutter_web:
